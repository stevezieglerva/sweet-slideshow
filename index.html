<!DOCTYPE html>
<html>

<head>
    <title>Sweet Shuffle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            background-color: black;
        }

        img {
            width: 100%;
            height: 100%;
            color: white;
        }

        #image-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .two-photos #image-wrapper img {
            width: 50%;
            object-fit: cover;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        .clock {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: calc(10px + 3vh);
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            font-weight: bold;
            text-align: center;
        }

        /* Navigation arrow styling */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .nav-arrow:before {
            content: '';
            width: 12px;
            height: 12px;
            border-top: 3px solid white;
            border-right: 3px solid white;
            display: block;
        }

        .nav-arrow-left {
            left: 20px;
        }

        .nav-arrow-right {
            right: 20px;
        }

        .nav-arrow-left:before {
            transform: rotate(-135deg);
        }

        .nav-arrow-right:before {
            transform: rotate(45deg);
        }

        /* Visible class for fade-in/fade-out */
        .nav-arrow-visible {
            opacity: 0.7;
        }

        .nav-arrow:hover {
            opacity: 1;
            background-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div id="container" class="clock-container">
        <div id="image-wrapper">
            <img id="image" alt="Loading image ...">
            <img id="image2" alt="Loading image ..." style="display:none;">
        </div>
        <div class="clock"></div>
    </div>
    <script>
        const img = document.getElementById('image');
        const img2 = document.getElementById('image2');
        const clock = document.querySelector('.clock');
        const container = document.getElementById('container');

        // Image history management
        const imageHistory = [];
        const MAX_HISTORY = 10;
        let currentHistoryIndex = 0;
        let autoAdvanceTimer;

        // UI elements for navigation
        const leftArrow = document.createElement('div');
        const rightArrow = document.createElement('div');

        // Touch tracking for swipe detection
        let touchStartX = 0;
        let touchEndX = 0;
        const MIN_SWIPE_DISTANCE = 50; // Minimum distance to detect swipe

        container.addEventListener('click', function () {
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }
        });

        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const queryParams = new URLSearchParams(window.location.search);
        const apiKey = queryParams.get('apiKey') || '';
        const mode = queryParams.get('mode');
        const photoCount = parseInt(queryParams.get('photos') || '1', 10);
        const isTwoPhotos = photoCount === 2;

        if (!apiKey.trim()) {
            console.error('API key is missing from the query string!');
        }

        if (isTwoPhotos) {
            container.classList.add('two-photos');
            img2.style.display = 'block';
        }

        if (mode === 'clock') {
            clock.style.fontSize = 'calc(20px + 6vh)'; // Increase font size when mode is clock
        }

        const apiUrl = `https://7iwwtnbtxomprzu2jb4i3osola0dyflt.lambda-url.us-east-1.on.aws?viewportWidth=${encodeURIComponent(viewportWidth)}&viewportHeight=${encodeURIComponent(viewportHeight)}&${queryParams}`;

        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').then(() => {
                console.log('Wake lock activated');
            }).catch((error) => {
                console.error('Wake lock error:', error);
            });
        } else {
            console.warn('Wake lock API not supported');
        }

        // Show navigation indicator and fade it out
        function showNavigationIndicator(direction) {
            const arrow = direction === 'left' ? leftArrow : rightArrow;

            // Make the arrow visible
            arrow.classList.add('nav-arrow-visible');

            // Fade out after a delay
            setTimeout(() => {
                arrow.classList.remove('nav-arrow-visible');
            }, 1500);
        }

        // Update the visibility of navigation controls based on current position
        function updateNavigationControls() {
            // Only show left arrow if there are previous images
            leftArrow.style.display = currentHistoryIndex > 0 ? 'flex' : 'none';

            // Always show right arrow (either to view newer images or to fetch new ones)
            rightArrow.style.display = 'flex';
        }

        // Display image from history at specified index
        function displayHistoryImage(index) {
            // Check if the index is valid
            if (index < 0 || index >= imageHistory.length) {
                console.warn('Invalid history index:', index);
                return;
            }

            // Update current index
            currentHistoryIndex = index;

            // Get image data from history
            const historyItem = imageHistory[index];

            // Update image and timestamp
            img.src = historyItem.imageUrl;
            if (isTwoPhotos && historyItem.imageUrl2) {
                img2.src = historyItem.imageUrl2;
                displayTime(historyItem.dateTaken, historyItem.dateTaken2);
            } else {
                displayTime(historyItem.dateTaken);
            }

            // Show/hide navigation arrows based on position
            updateNavigationControls();

            // Reset auto-advance timer
            resetAutoAdvanceTimer();
        }

        // Navigate to previous image
        function showPreviousImage() {
            if (currentHistoryIndex > 0) {
                displayHistoryImage(currentHistoryIndex - 1);
            }
        }

        // Navigate to next image
        function showNextImage() {
            if (currentHistoryIndex < imageHistory.length - 1) {
                displayHistoryImage(currentHistoryIndex + 1);
            } else {
                // If at the end of history, fetch new image
                updateImage();
            }
        }

        function updateImage() {
            if (isTwoPhotos) {
                Promise.all([fetch(apiUrl), fetch(apiUrl)])
                    .then(([res1, res2]) => Promise.all([res1.json(), res2.json()]))
                    .then(([data1, data2]) => {
                        const newImage = {
                            imageUrl: data1.message.image_url,
                            imageUrl2: data2.message.image_url,
                            dateTaken: data1.message.date_taken,
                            dateTaken2: data2.message.date_taken
                        };

                        imageHistory.push(newImage);
                        if (imageHistory.length > MAX_HISTORY) {
                            imageHistory.shift();
                        }

                        currentHistoryIndex = imageHistory.length - 1;

                        img.src = newImage.imageUrl;
                        img2.src = newImage.imageUrl2;
                        displayTime(newImage.dateTaken, newImage.dateTaken2);

                        updateNavigationControls();
                        leftArrow.classList.remove('nav-arrow-visible');
                        rightArrow.classList.remove('nav-arrow-visible');
                    })
                    .catch(error => console.error(error));
            } else {
                fetch(apiUrl)
                    .then(response => response.json())
                    .then(data => {
                        const newImage = {
                            imageUrl: data.message.image_url,
                            dateTaken: data.message.date_taken
                        };

                        imageHistory.push(newImage);
                        if (imageHistory.length > MAX_HISTORY) {
                            imageHistory.shift();
                        }

                        currentHistoryIndex = imageHistory.length - 1;

                        img.src = newImage.imageUrl;
                        displayTime(newImage.dateTaken);

                        updateNavigationControls();
                        leftArrow.classList.remove('nav-arrow-visible');
                        rightArrow.classList.remove('nav-arrow-visible');
                    })
                    .catch(error => console.error(error));
            }
        }

        updateImage();

        let updateInterval = queryParams.get('timing') === 'slow' || mode === 'clock' ? 60000 : 15000;
        console.log(`Selected update interval: ${updateInterval}ms`);

        // Reset auto-advance timer
        function resetAutoAdvanceTimer() {
            // Clear existing timer
            clearInterval(autoAdvanceTimer);

            // Set a new timer with the appropriate interval
            autoAdvanceTimer = setInterval(updateImage, updateInterval);
        }

        // Set initial timer
        autoAdvanceTimer = setInterval(updateImage, updateInterval);

        let lastLabel = '';
        let lastLabel2 = '';
        function displayTime(label, label2) {
            if (label !== undefined) {
                lastLabel = label;
            }
            if (label2 !== undefined) {
                lastLabel2 = label2;
            }
            const date = new Date();
            const time = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
            if (mode === 'clock') {
                const day = date.toLocaleString('en-US', { weekday: 'short' });
                const month = date.toLocaleString('en-US', { month: 'short' });
                const dayOfMonth = date.getDate();
                const clockTime = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                clock.innerHTML = `${day} ${month} ${dayOfMonth} <br/> ${clockTime}`;
            } else if (lastLabel.includes(' & ')) {
                const parts = lastLabel.split(' & ');
                clock.textContent = parts[0] + " | " + time + " | " + parts[1];
            } else {
                clock.textContent = lastLabel + " | " + time;
            }
        }
        displayTime();
        setInterval(displayTime, 60000);

        // Handle keyboard events
        function handleKeyNavigation(event) {
            if (event.key === "ArrowLeft") {
                showPreviousImage();
                showNavigationIndicator('left');
            } else if (event.key === "ArrowRight") {
                showNextImage();
                showNavigationIndicator('right');
            }
        }

        // Touch handling functions
        function handleTouchStart(event) {
            touchStartX = event.changedTouches[0].screenX;
        }

        function handleTouchMove(event) {
            // Optional: can be used to provide immediate visual feedback during swipe
        }

        function handleTouchEnd(event) {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
        }

        function handleSwipe() {
            // Calculate swipe distance
            const swipeDistance = touchEndX - touchStartX;

            // Detect swipe direction if it exceeds minimum threshold
            if (Math.abs(swipeDistance) > MIN_SWIPE_DISTANCE) {
                if (swipeDistance > 0) {
                    // Right swipe - show previous image
                    showPreviousImage();
                    showNavigationIndicator('left');
                } else {
                    // Left swipe - show next image
                    showNextImage();
                    showNavigationIndicator('right');
                }
            }
        }

        // Initialize navigation controls
        function setupNavigationControls() {
            // Set up left arrow
            leftArrow.className = 'nav-arrow nav-arrow-left';
            leftArrow.addEventListener('click', () => {
                showPreviousImage();
                showNavigationIndicator('left');
            });
            container.appendChild(leftArrow);

            // Set up right arrow
            rightArrow.className = 'nav-arrow nav-arrow-right';
            rightArrow.addEventListener('click', () => {
                showNextImage();
                showNavigationIndicator('right');
            });
            container.appendChild(rightArrow);

            // Set up keyboard event listeners
            document.addEventListener('keydown', handleKeyNavigation);

            // Set up touch event listeners for swipe support
            container.addEventListener('touchstart', handleTouchStart, false);
            container.addEventListener('touchmove', handleTouchMove, false);
            container.addEventListener('touchend', handleTouchEnd, false);

            // Make arrows visible on hover over the container
            container.addEventListener('mouseover', function() {
                if (currentHistoryIndex > 0) {
                    leftArrow.classList.add('nav-arrow-visible');
                }
                rightArrow.classList.add('nav-arrow-visible');
            });

            // Hide arrows when mouse leaves the container
            container.addEventListener('mouseout', function() {
                leftArrow.classList.remove('nav-arrow-visible');
                rightArrow.classList.remove('nav-arrow-visible');
            });

            // Initialize controls visibility
            updateNavigationControls();
        }

        // Make sure the first image is stored in history when initially loaded
        if (img.src) {
            // Add initial image to history
            imageHistory.push({
                imageUrl: img.src,
                dateTaken: clock.textContent.split('|')[0].trim() || ''
            });
            currentHistoryIndex = 0;
            updateNavigationControls();
        }

        // Initialize the navigation system
        setupNavigationControls();

        // Also ensure it's set up after DOM is fully loaded (just to be safe)
        document.addEventListener('DOMContentLoaded', function() {
            // Setup navigation controls if not already done
            if (!document.querySelector('.nav-arrow')) {
                setupNavigationControls();
            }
        });
    </script>
</body>

</html>
